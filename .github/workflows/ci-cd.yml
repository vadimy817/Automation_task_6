name: Java CI/CD Pipeline

# Тригер: запуск при кожному пуші в гілку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Надаємо права для створення та публікації пакетів (Docker/Jar) у GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Отримання коду з репозиторію
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Встановлення JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # КРОК ЗАВДАННЯ 1: Статичний аналіз коду (Checkstyle)
      - name: Run Code Style Analysis (Checkstyle)
        run: mvn checkstyle:check

      # КРОК ЗАВДАННЯ 2: Автоматизоване тестування
      - name: Run Automated Tests
        run: mvn test

      # КРОК ЗАВДАННЯ 3: Збирання проєкту в jar
      - name: Build Package (JAR)
        run: mvn clean package -DskipTests

      # КРОК ЗАВДАННЯ 4: Збирання Docker Image та публікація у GitHub Container Registry (GHCR)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/cicd-demo-app:latest
            ghcr.io/${{ github.repository }}/cicd-demo-app:${{ github.sha }}